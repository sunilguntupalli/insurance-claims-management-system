server:
  port: 8081
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

spring:
  application:
    name: claim-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claims}
    username: ${DB_USERNAME:claims}
    password: ${DB_PASSWORD:claims}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: claims
    open-in-view: false
  flyway:
    enabled: true
    schemas: claims
    default-schema: claims
    create-schemas: true
    table: flyway_schema_history_claim_service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sunil.insurance.common.events
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
