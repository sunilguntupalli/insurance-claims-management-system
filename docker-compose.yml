services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claims
      POSTGRES_USER: claims
      POSTGRES_PASSWORD: claims
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims -d claims"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.8
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  claim-service:
    build:
      context: ./claim-service
      dockerfile: ../Dockerfile.service
      args:
        JAR_FILE: target/claim-service-0.1.0-SNAPSHOT.jar
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/claims
      DB_USERNAME: claims
      DB_PASSWORD: claims
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  approval-service:
    build:
      context: ./approval-service
      dockerfile: ../Dockerfile.service
      args:
        JAR_FILE: target/approval-service-0.1.0-SNAPSHOT.jar
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/claims
      DB_USERNAME: claims
      DB_PASSWORD: claims
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  settlement-service:
    build:
      context: ./settlement-service
      dockerfile: ../Dockerfile.service
      args:
        JAR_FILE: target/settlement-service-0.1.0-SNAPSHOT.jar
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/claims
      DB_USERNAME: claims
      DB_PASSWORD: claims
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./notification-service
      dockerfile: ../Dockerfile.service
      args:
        JAR_FILE: target/notification-service-0.1.0-SNAPSHOT.jar
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
